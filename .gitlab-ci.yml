stages:
  - lint
  - sonar
  - build
  - test
  - build-image
  - scan
  - deploy

variables:
  DOCKER_REGISTRY: gitlab-dpt-info-sciences.univ-rouen.fr:5555
  FRONTEND_IMAGE_NAME: ${DOCKER_REGISTRY}/${CI_PROJECT_PATH}/frontend
  FRONTEND_IMAGE_TAG: ${CI_COMMIT_SHORT_SHA}

# Cache optimisé pour la racine
cache:
  key: ${CI_COMMIT_REF_SLUG}
  paths:
    - node_modules/

# -----------------------------------------------------------------------------
# STAGE LINT
# -----------------------------------------------------------------------------
eslint_front:
  stage: lint
  image: node:25.2.0-alpine3.22
  before_script:
    - npm ci
  script:
    - npx eslint "src/**/*.ts"
  rules:
    - if: $CI_COMMIT_BRANCH =~ /^(feat|feature)\/.*/
    - if: $CI_COMMIT_BRANCH == "develop"
    - if: $CI_COMMIT_BRANCH == "preprod"
    - if: $CI_COMMIT_BRANCH == "main"

# -----------------------------------------------------------------------------
# STAGE SONAR (UNIQUEMENT PROD)
# -----------------------------------------------------------------------------
sonar_front:
  stage: sonar
  image: node:25.2.0-alpine3.22
  before_script:
    - npm ci
  script:
    - npx sonar-scanner \
      -Dsonar.host.url=https://pseudotribally-vespine-tasha.ngrok-free.dev \
      -Dsonar.token=sqp_d0b12c6d5ee42a8b2274a3b1fec17bdf6b1c947e \
      -Dsonar.projectKey=angular-front
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
  needs: ["eslint_front"]

# -----------------------------------------------------------------------------
# STAGE BUILD
# -----------------------------------------------------------------------------
build-frontend:
  stage: build
  image: node:20
  before_script:
    - npm install
  script:
    - npm run build -- --configuration=production
  artifacts:
    paths:
      - dist/
    expire_in: 30 days
  rules:
    - if: $CI_COMMIT_BRANCH == "develop"
    - if: $CI_COMMIT_BRANCH == "preprod"
    - if: $CI_COMMIT_BRANCH == "main"
  needs: 
    - job: eslint_front
    - job: sonar_front
      optional: true

# -----------------------------------------------------------------------------
# STAGE TEST
# -----------------------------------------------------------------------------
front-unit-test:
  stage: test
  image: node:25.2.0-alpine3.22
  before_script:
    - apk add --no-cache chromium
    - export CHROME_BIN=/usr/bin/chromium-browser
    - npm ci
  script:
    - npm test -- --no-watch --browsers=ChromeHeadlessCI --code-coverage
  coverage: '/Statements\s*:\s*(\d+\.?\d*)%/'
  artifacts:
    when: always
    paths:
      - coverage/
    reports:
      junit: coverage/junit.xml
  rules:
    - if: $CI_COMMIT_BRANCH =~ /^(feat|feature)\/.*/
    - if: $CI_COMMIT_BRANCH == "develop"
    - if: $CI_COMMIT_BRANCH == "preprod"
    - if: $CI_COMMIT_BRANCH == "main"
  needs: 
    - job: build-frontend
      optional: true

# -----------------------------------------------------------------------------
# STAGE BUILD IMAGE
# -----------------------------------------------------------------------------
build-frontend-image:
  stage: build-image
  image: docker:20.10.16
  services:
    - docker:20.10.16-dind
  script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $DOCKER_REGISTRY
    - docker build -t $FRONTEND_IMAGE_NAME:$FRONTEND_IMAGE_TAG -t $FRONTEND_IMAGE_NAME:latest .
    - docker push $FRONTEND_IMAGE_NAME:$FRONTEND_IMAGE_TAG
    - docker push $FRONTEND_IMAGE_NAME:latest
  rules:
    - if: $CI_COMMIT_BRANCH == "develop"
    - if: $CI_COMMIT_BRANCH == "preprod"
    - if: $CI_COMMIT_BRANCH == "main"
  needs: ["front-unit-test", "build-frontend"]

# -----------------------------------------------------------------------------
# STAGE SCAN (TRIVY)
# -----------------------------------------------------------------------------
trivy-frontend:
  stage: scan
  image: { name: "aquasec/trivy:latest", entrypoint: [""] }
  script:
    - trivy image --exit-code 0 --severity HIGH,CRITICAL $FRONTEND_IMAGE_NAME:$FRONTEND_IMAGE_TAG
  rules:
    - if: $CI_COMMIT_BRANCH == "preprod"
    - if: $CI_COMMIT_BRANCH == "main"
  needs: ["build-frontend-image"]

# -----------------------------------------------------------------------------
# STAGE DEPLOY (Même logique que le Back)
# -----------------------------------------------------------------------------
deploy-front-dev:
  stage: deploy
  script:
    - echo "Déploiement Angular automatique en DEV"
  rules:
    - if: $CI_COMMIT_BRANCH == "develop"
      when: always
  needs: ["build-frontend-image"]

deploy-front-preprod:
  stage: deploy
  script:
    - echo "Déploiement Angular manuel en PREPROD"
  rules:
    - if: $CI_COMMIT_BRANCH == "preprod"
      when: manual
  needs: ["trivy-frontend"]

deploy-front-prod:
  stage: deploy
  script:
    - echo "Déploiement Angular manuel en PROD"
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      when: manual
  needs: ["trivy-frontend"]