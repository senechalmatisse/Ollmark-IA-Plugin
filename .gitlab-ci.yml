stages:
  - lint
  - sonar
  - build
  - test
  - build-image
  - scan
  - deploy

variables:
  DOCKER_REGISTRY: gitlab-dpt-info-sciences.univ-rouen.fr:5555
  FRONTEND_IMAGE_NAME: ${DOCKER_REGISTRY}/${CI_PROJECT_PATH}/frontend
  FRONTEND_IMAGE_TAG: ${CI_COMMIT_SHORT_SHA}
  SONAR_USER_HOME: "${CI_PROJECT_DIR}/.sonar"
  GIT_DEPTH: "0"

# Cache optimisé pour la racine
cache:
  key: ${CI_COMMIT_REF_SLUG}
  paths:
    - node_modules/

# -----------------------------------------------------------------------------
# STAGE LINT
# -----------------------------------------------------------------------------
eslint_front:
  stage: lint
  image: node:25.2.0-alpine3.22
  before_script:
    - npm ci
  script:
    - npx eslint "src/**/*.ts"
  rules:
    - if: $CI_PIPELINE_SOURCE == 'merge_request_event'
    - if: $CI_COMMIT_BRANCH =~ /^(feat|feature)\/.*/
    - if: $CI_COMMIT_BRANCH == "develop"
    - if: $CI_COMMIT_BRANCH == "preprod"
    - if: $CI_COMMIT_BRANCH == "main"

# -----------------------------------------------------------------------------
# STAGE SONAR (UNIQUEMENT PROD)
# -----------------------------------------------------------------------------
sonar_front:
  stage: sonar
  image:
    name: sonarsource/sonar-scanner-cli:11
    entrypoint: [""]
  cache:
    key: "sonar-cache-$CI_COMMIT_REF_SLUG"
    paths:
      - "${SONAR_USER_HOME}/cache"
  script: 
    - sonar-scanner \
      -Dsonar.host.url="${SONAR_HOST_URL}" \
      -Dsonar.token="${SONAR_TOKEN}" \
      -Dsonar.qualitygate.wait=true
  allow_failure: false
  rules:
    - if: $CI_COMMIT_BRANCH == 'main'
  needs: ["eslint_front"]

# -----------------------------------------------------------------------------
# STAGE BUILD
# -----------------------------------------------------------------------------
build-frontend:
  stage: build
  image: node:20
  before_script:
    - npm install
  script:
    - npm run build -- --configuration=production
  allow_failure: false
  artifacts:
    paths:
      - dist/
    expire_in: 30 days
  rules:
    - if: $CI_PIPELINE_SOURCE == 'merge_request_event'
    - if: $CI_COMMIT_BRANCH =~ /^(feat|feature)\/.*/
    - if: $CI_COMMIT_BRANCH == "develop"
    - if: $CI_COMMIT_BRANCH == "preprod"
    - if: $CI_COMMIT_BRANCH == "main"
  needs:
    - job: eslint_front
    - job: sonar_front
      optional: true

# -----------------------------------------------------------------------------
# STAGE TEST
# -----------------------------------------------------------------------------
front-unit-test:
  stage: test
  image: node:25.2.0-alpine3.22
  before_script:
    - apk add --no-cache chromium
    - export CHROME_BIN=/usr/bin/chromium-browser
    - npm ci
  script:
    # Karma s'arrêtera avec un code d'erreur si coverage < 70% grâce au karma.conf.js
    - npm test -- --no-watch --browsers=ChromeHeadlessCI --code-coverage
  coverage: '/Statements\s*:\s*(\d+\.?\d*)%/'
  allow_failure: false  # Empêche la suite de la pipeline en cas d'échec
  artifacts:
    when: always
    paths:
      - coverage/
    reports:
      junit: coverage/junit.xml
      # Ajout du rapport Cobertura pour l'intégration visuelle dans GitLab
      coverage_report:
        coverage_format: cobertura
        path: coverage/cobertura-coverage.xml
  rules:
    - if: $CI_PIPELINE_SOURCE == 'merge_request_event'
    - if: $CI_COMMIT_BRANCH =~ /^(feat|feature)\/.*/
    - if: $CI_COMMIT_BRANCH == "develop"
    - if: $CI_COMMIT_BRANCH == "preprod"
    - if: $CI_COMMIT_BRANCH == "main"
  needs:
    - job: build-frontend


# -----------------------------------------------------------------------------
# STAGE BUILD IMAGE
# -----------------------------------------------------------------------------
build-frontend-image:
  stage: build-image
  image: docker:20.10.16
  services:
    - docker:20.10.16-dind
  script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $DOCKER_REGISTRY
    - docker build -t $FRONTEND_IMAGE_NAME:$FRONTEND_IMAGE_TAG -t $FRONTEND_IMAGE_NAME:latest .
    - docker push $FRONTEND_IMAGE_NAME:$FRONTEND_IMAGE_TAG
    - docker push $FRONTEND_IMAGE_NAME:latest
  after_script:
    - docker system prune -af || true
  rules:
    - if: $CI_COMMIT_BRANCH == "develop"
    - if: $CI_COMMIT_BRANCH == "preprod"
    - if: $CI_COMMIT_BRANCH == "main"
  needs: ["front-unit-test", "build-frontend"]

# -----------------------------------------------------------------------------
# STAGE SCAN (TRIVY)
# -----------------------------------------------------------------------------
trivy-frontend:
  stage: scan
  image: 
    name: aquasec/trivy:latest
    entrypoint: [""]
  variables:
    TRIVY_USERNAME: $CI_REGISTRY_USER
    TRIVY_PASSWORD: $CI_REGISTRY_PASSWORD
    TRIVY_AUTH_URL: $DOCKER_REGISTRY
    TRIVY_CACHE_DIR: ".trivycache/" # On déplace le cache dans le dossier du projet
  cache:
    key: trivy-db-cache
    paths:
      - .trivycache/
  script:
    # 1. Nettoyage initial des fichiers temporaires pour libérer de l'espace
    - trivy clean --scan-cache
    
    # 2. Premier passage : Affichage informatif (ne bloque pas) pour les vulnérabilités HIGH
    - trivy image --exit-code 0 --severity HIGH --cache-dir $TRIVY_CACHE_DIR $FRONTEND_IMAGE_NAME:$FRONTEND_IMAGE_TAG
    
    # 3. Second passage : BLOQUANT (exit 1) si des vulnérabilités CRITICAL sont trouvées
    - trivy image --exit-code 1 --severity CRITICAL --cache-dir $TRIVY_CACHE_DIR $FRONTEND_IMAGE_NAME:$FRONTEND_IMAGE_TAG
  after_script:
    # Optionnel : Nettoyage après exécution pour ne pas encombrer le runner
    - rm -rf .trivycache/tmp
  rules:
    - if: $CI_COMMIT_BRANCH == "preprod"
    - if: $CI_COMMIT_BRANCH == "main"
  needs: ["build-frontend-image"]

# -----------------------------------------------------------------------------
# STAGE DEPLOY
# -----------------------------------------------------------------------------
deploy-front-dev:
  stage: deploy
  image: docker:20.10.16
  services:
    - docker:20.10.16-dind
  before_script:
    # Recreate SSH key from Base64
    - mkdir -p ~/.ssh
    - echo "$SSH_PRIVATE_KEY_BASE64" | base64 -d > ~/.ssh/id_ed25519
    - chmod 600 ~/.ssh/id_ed25519
    # Add VM host to known_hosts to avoid SSH prompt
    - ssh-keyscan -H $VM_HOST >> ~/.ssh/known_hosts
  script:
    - ssh -o StrictHostKeyChecking=no $VM_USER@$VM_HOST "~/ollmark-frontend/pg-ia/deploy.sh"
  rules:
    - if: $CI_COMMIT_BRANCH == "develop"
      when: on_success
  needs: ["build-frontend-image"]

deploy-front-preprod:
  stage: deploy
  image: docker:20.10.16
  services:
    - docker:20.10.16-dind
  before_script:
    # Recreate SSH key from Base64
    - mkdir -p ~/.ssh
    - echo "$SSH_PRIVATE_KEY_BASE64" | base64 -d > ~/.ssh/id_ed25519
    - chmod 600 ~/.ssh/id_ed25519
    # Add VM host to known_hosts to avoid SSH prompt
    - ssh-keyscan -H $VM_HOST_PREPROD >> ~/.ssh/known_hosts
  script:
    - ssh -o StrictHostKeyChecking=no $VM_USER@$VM_HOST_PREPROD "~/ollmark-frontend/pg-ia/deploy.sh"
  rules:
    - if: $CI_COMMIT_BRANCH == "preprod"
      when: manual
  needs: ["trivy-frontend"]

deploy-front-prod:
  stage: deploy
  script:
    - echo "Déploiement Angular manuel en PROD"
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      when: manual
  needs: ["trivy-frontend"]
