<div class="input-wrapper">
    <div
        class="input-inner"
        [class.focused]="isFocused()"
    >

        <textarea
            #textareaEl
            [ngModel]="draft()"
            (ngModelChange)="draft.set($event)"
            (keydown.enter)="onEnterKey($event)"
            (focus)="isFocused.set(true)"
            (blur)="isFocused.set(false)"
            (input)="autoResize($event)"
            [disabled]="isLoading || !enabled"
            placeholder="Entrer une demande à l'IA"
            rows="1"
            maxlength="2000"
            aria-label="Votre message"
        ></textarea>

        <button
            class="send-btn"
            [class.send-btn--active]="!!draft().trim() && !isLoading && enabled"
            (click)="submit()"
            [disabled]="isLoading || !enabled || !draft().trim()"
        >

        <!-- Texte accessible masqué visuellement -->
        <span class="sr-only">Envoyer</span>

            @if (!isLoading) {

                <svg
                    width="15"
                    height="15"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2.5"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                >
                    <line x1="12" y1="19" x2="12" y2="5"/>
                    <polyline points="5 12 12 5 19 12"/>
                </svg>

            } @else {

                <span class="dots">
                    <span></span>
                    <span></span>
                    <span></span>
                </span>

            }

        </button>

    </div>
</div>
