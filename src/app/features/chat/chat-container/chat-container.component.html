<div class="shell">

    @if (facade.hasMessages()) {
        <div class="top-actions">
            <app-generic-button
                variant="danger"
                text="Réinitialiser"
                icon="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8 M3 3v5h5"
                [disabled]="facade.isLoading()"
                (clicked)="onConversationCleared()"
            />
        </div>
    }

    <app-chat-history
        class="history"
        [messages]="facade.messages()"
    />

    <app-chat-input
        class="input"
        [isLoading]="facade.isLoading()"
        [enabled]="!!facade.projectId()"
        (messageSent)="onMessageSent($event)"
    />

</div>
