<div class="carousel">
  <button
    class="carousel-btn"
    (click)="onPrev()"
    [disabled]="currentIndex === 0"
    aria-label="Précédent"
  >
    <img src="https://img.icons8.com/FFFFFF/sf-black/64/back.png" alt="back"/>
  </button>

  <div class="carousel-track-container">
    <div
      class="carousel-track"
      [style.transform]="'translateX(-' + (currentIndex * itemWidth) + 'px)'"
    >
      <div
        class="carousel-item"
        *ngFor="let item of items(); let i = index"
        [ngClass]="{
          'active': i === selectedIndex,
          'selected': selectedIds().has(item.id)
        }"
        (click)="onSelectItem(i)"
        (keydown.enter)="onSelectItem(i)"
        tabindex="0"
        role="button"
      >
        <img class="item-image" [src]="item.imageUrl" alt="image de la boutique" />
        <span class="selected-mark" *ngIf="selectedIds().has(item.id)">✓</span>
      </div>
    </div>
  </div>

  <button
    class="carousel-btn"
    (click)="onNext()"
    [disabled]="currentIndex >= maxIndex"
    aria-label="Suivant"
  >
    <img src="https://img.icons8.com/FFFFFF/sf-black/64/forward.png" alt="back"/>

  </button>
</div>
