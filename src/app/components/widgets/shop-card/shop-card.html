<div class="shop-card">
  @if (loading()) {
    <div class="spinner-overlay">
      <div class="spinner"></div>
    </div>
  }
  <div class="shop-image">
    <img
      [src]="imageUrl"
      [alt]="shop.label"
      loading="lazy"
      decoding="async"
      fetchpriority="low"
      (error)="onImageError()" />
  </div>
  <div class="shop-info" [class.selected]="isSelected()">
    <p class="shop-name">{{ shop.label }}</p>
    <div class="shop-actions">
      <button class="action-btn" title="Générer dans Penpot" (click)="onGenerate($event)" [disabled]="isSelected()">
        <img src="https://img.icons8.com/sf-regular/FFFFFF/64/fast-forward.png" alt="fast-forward"/>
      </button>
      <button class="action-btn" title="Ajouter à la sélection" (click)="onAdd($event)" [disabled]="isSelected()">
        <img src="https://img.icons8.com/sf-regular/FFFFFF/64/add.png" alt="plus-math"/>
      </button>
    </div>
  </div>
</div>
