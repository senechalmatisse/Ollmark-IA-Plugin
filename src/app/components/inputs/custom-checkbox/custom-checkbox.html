<div class="checkbox-wrapper">
  <input
    type="checkbox"
    [id]="checkId"
    [checked]="checked()"
    (change)="onToggle($event)"
    class="checkbox-input"
  />
  <div class="text-wrapper">
    <label [for]="checkId" class="checkbox-title">{{ title() }}</label>
    @if (subtitle()) {
      <span class="checkbox-subtitle">{{ subtitle() }}</span>
    }
  </div>
</div>
