<button
    [type]="type"
    [disabled]="disabled"
    [attr.aria-label]="text ?? 'button'"
    [class]="computedClass"
    (click)="handleClick()"
>

    <!--
        Icône SVG — viewBox 24×24 standardisé.
        `icon` est la valeur du path `d` (ex: "M3 12a9 9...").
        width/height fixes à 16×16 pour un rendu cohérent quelle que soit la variante.
    -->
    @if (icon) {
        <svg
            class="btn-icon"
            viewBox="0 0 24 24"
            width="16"
            height="16"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
            aria-hidden="true"
        >
            <path [attr.d]="icon" />
        </svg>
    }

    <!-- Libellé texte — flex-shrink: 0 empêche sa troncature dans les layouts flex. -->
    @if (text) {
        <span class="btn-label">{{ text }}</span>
    }

</button>
