<div class="shop-view-container">
  <div class="filters-row">
    <app-search-bar (inputUpdated)="onSearchUpdate($event)"></app-search-bar>
    <app-drop-down
      label="Catégorie"
      [options]="categoryOptions"
      [showPlaceholder]="true"
      (selectionChange)="onCategorySelect($event)">
    </app-drop-down>
    <app-drop-down
      label="Marketplace"
      [options]="marketplaceOptions"
      [showPlaceholder]="true"
      (selectionChange)="onMarketplaceSelect($event)">
    </app-drop-down>
  </div>

  @if (loading) {
    <p class="loading-text">Chargement des boutiques...</p>
  } @else if (shopRows.length === 0) {
    <p class="empty-text">Aucune boutique trouvée.</p>
  } @else {
    <cdk-virtual-scroll-viewport
      [itemSize]="rowHeight"
      class="shops-viewport"
      (scrolledIndexChange)="onVirtualScroll($event)">
      <div *cdkVirtualFor="let row of shopRows; trackBy: trackRow" class="shop-row">
        @for (shop of row; track shop.id) {
          <app-shop-card
            [shop]="shop"
            (generate)="onGenerate($event)"
            (add)="onAdd($event)">
          </app-shop-card>
        }
      </div>
      @if (loadingMore) {
        <div class="loading-more">
          <div class="spinner"></div>
          <span>Chargement...</span>
        </div>
      }
    </cdk-virtual-scroll-viewport>
  }

  @if (showModal && selectedShop) {
    <app-shop-field-selector
      [shop]="selectedShop"
      [mode]="selectedMode"
      (closed)="onModalClose()"
      (confirmed)="onModalConfirm()"
    />
  }
</div>
